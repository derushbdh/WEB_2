<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="CSS/style.css">
  <script src="http://d3js.org/d3.v7.min.js"> </script>
  <script src="JavaScript/data.js"></script>
  <script src="JavaScript/table.js"></script>
  <script src="JavaScript/chart.js"></script>
  <script src="JavaScript/main.js"></script>
</head>
<body>   
  <h3>Список самых высоких зданий</h3>
  
  <form id="graph-form">
    <p>Значение по оси ОХ</p>
    <input type="radio" name="xAxisGroup" value="Страна"> Страна<br>
    <input type="radio" name="xAxisGroup" value="Год" checked> Год<br>

    <p>Значение по оси ОY</p>
    <label id="labelMax"><input type="checkbox" id="showMax" checked> Максимальная высота</label><br>
    <label id="labelMin"><input type="checkbox" id="showMin" checked> Минимальная высота</label><br>

    <p>Тип графика 
      <select id="chartType">
        <option value="bar">Гистограмма</option>
        <option value="scatter">Точечная</option>
      </select>
    </p>

    <input type="button" id="draw-graph-btn" value="Построить">
  </form>
  <br>

  <svg></svg>
  <button id="toggle-btn">Скрыть таблицу</button>
  <table id="build"> 
  </table>
</body>
</html>
